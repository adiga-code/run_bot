services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_IDS=${ADMIN_IDS}
      - MORNING_REMINDER_HOUR=${MORNING_REMINDER_HOUR:-8}
      - EVENING_REMINDER_HOUR=${EVENING_REMINDER_HOUR:-20}
